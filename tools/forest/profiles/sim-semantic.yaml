api_version: forest.dev/v1
name: sim-semantic
description: Gazebo + segmentação semântica ONNX + RViz (máscara colorida)

lifecycle:
  pre_start: cleanup

layers:
  - id: sim_semantic
    kind: perception
    package: forest_semantic_segmentation
    launch: sim_semantic.launch.py
    args:
      world: forest_gentle_trees_rocks.sdf

ui:
  launch_hint: "PLAY no Gazebo; ver painéis Camera RGB e Semantic mask (color) no RViz"

wait_nodes:
  - semantic_segmentation_node
