api_version: forest.dev/v1
name: sim-lidar3d-test
description: Sim MVP + EKF + Airy-class 3D LiDAR + classificação (sem SLAM 2D)

lifecycle:
  pre_start: cleanup_hybrid

layers:
  - id: sim
    kind: sim
    package: forest_hybrid_conf
    launch: sim_mvp_slam.launch.py
    args:
      world: mvp_empty_flat.sdf
      use_rviz: true
      ekf_mode: local
      paused: false
      use_slam: false
      lidar_mode: 3d
      # RViz: forest_mvp_sim_lidar3d.rviz (sem /map SLAM, sem /scan 2D)

wait_nodes:
  - ekf_local
  - lidar_scan_classify_node
  - lidar3d_segmentation_node
