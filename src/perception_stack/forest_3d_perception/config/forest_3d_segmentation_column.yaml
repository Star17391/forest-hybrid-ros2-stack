# Overlay: column+nDSM (Sprint 2–6). Carregar após forest_3d_segmentation.yaml
# ou via FOREST_LIDAR3D_SEG_CONFIG / forest test lidar3d-w0-w3 --trunk-column

lidar3d_segmentation_node:
  ros__parameters:
    trunk_method: "column"
    publish_ndsm_debug: false
    # Trunk band only — exclude canopy (was 5.0 m, caused cylinders at tree tops)
    ndsm_trunk_min_m: 0.35
    ndsm_trunk_max_m: 2.2
    column_min_points_per_cell: 2
    column_min_cells_per_column: 3
    column_min_points_per_column: 8
    column_max_points_per_column: 600
    column_max_columns_per_frame: 20
    cylinder_min_height_m: 0.35
    cylinder_max_radius_m: 0.70
    cylinder_max_rmse_m: 0.16
    cylinder_min_inlier_ratio: 0.40
    cylinder_inlier_dist_m: 0.12
    cylinder_max_slice_height_m: 2.2
