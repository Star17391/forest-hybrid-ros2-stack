# Fase 1 — 3D segmentation: ground (2.5D grid), trunks, obstacles.
lidar3d_segmentation_node:
  ros__parameters:
    # Input
    input_topic: "/sensors/lidar/points"
    input_frame: "laser"
    processing_frame: "marble_hd2/base_link"

    # Preprocessing
    voxel_leaf_size_m: 0.05
    min_range_m: 0.3
    max_range_m: 15.0
    min_z_m: -2.0
    max_z_m: 7.5

    # Ground: 2.5D height grid (default) or legacy RANSAC plane
    ground_method: "grid"  # grid | ransac
    grid_size_x_m: 30.0
    grid_size_y_m: 30.0
    grid_resolution_m: 0.3
    grid_ground_height_thresh_m: 0.3
    grid_hole_depth_m: 0.15
    grid_inpaint_passes: 3
    # Solo robusto: percentil baixo por célula + remoção de picos (troncos) vs vizinhos
    grid_height_percentile: 0.10
    grid_smooth_max_step_m: 0.40
    grid_smooth_clamp_passes: 2
    grid_smooth_median_radius_cells: 1
    grid_ground_neighbor_cells: 2
    publish_terrain_mesh: true

    # Sprint 1 — ground connectivity (region growing on terrain grid)
    ground_connectivity_enable: true
    ground_connectivity_max_step_m: 0.05
    ground_connectivity_seed_radius_m: 4.0
    publish_ground_suspended_debug: true
    ground_suspended_topic: "/perception/lidar3d/ground_suspended"
    terrain_mesh_topic: "/perception/lidar3d/terrain_mesh"

    # Ground RANSAC (only when ground_method == ransac)
    ground_ransac_distance_m: 0.08
    ground_ransac_max_iterations: 100
    ground_max_slope_deg: 15.0
    ground_z_band_m: 0.30

    # Trunk detection — cluster estável (default); column = opt-in Sprint 2–6
    trunk_method: "cluster"  # cluster | column | slice
    trunk_cluster_tolerance_m: 0.25
    trunk_min_cluster_size: 15
    trunk_max_cluster_size: 2000
    trunk_min_height_m: 0.55
    trunk_max_radius_m: 0.65
    trunk_min_verticality: 0.65

    # Sprint 2–4: nDSM band + 2D columns + vertical cylinder fit
    ndsm_trunk_min_m: 0.35
    ndsm_trunk_max_m: 4.0
    column_min_points_per_cell: 2
    column_min_cells_per_column: 2
    column_min_points_per_column: 10
    cylinder_min_height_m: 0.45
    cylinder_max_radius_m: 0.65
    cylinder_max_rmse_m: 0.14
    cylinder_min_inlier_ratio: 0.45
    cylinder_inlier_dist_m: 0.10

    # Sprint 6: temporal landmark tracking
    landmark_assoc_max_xy_m: 0.85
    landmark_max_misses: 6

    publish_ndsm_debug: false
    ndsm_debug_topic: "/perception/lidar3d/ndsm_debug"
    tree_landmarks_topic: "/perception/lidar3d/tree_landmarks"

    # Output topics
    ground_topic: "/perception/lidar3d/ground"
    trunks_topic: "/perception/lidar3d/trunks"
    obstacles_topic: "/perception/lidar3d/obstacles"
    markers_topic: "/perception/lidar3d/trunk_markers"

    # TF
    tf_timeout_sec: 0.1

    # Debug (validação W0–W3)
    publish_debug_stats: true
    debug_stats_topic: "/perception/lidar3d/debug_stats"
    always_publish_segmentation_clouds: true
    pipeline_log_interval_frames: 25
