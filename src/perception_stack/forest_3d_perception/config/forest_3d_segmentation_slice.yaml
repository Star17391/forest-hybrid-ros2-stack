# Overlay: Euclidean trunk detection (robust for sparse mobile LiDAR).
# Carregar após forest_3d_segmentation.yaml ou via --trunk-slice.
#
# Pipeline: nDSM band → 3D Euclidean clustering → PCA verticality
# → ground anchor → cylinder fit → persistent tracking.

lidar3d_segmentation_node:
  ros__parameters:
    trunk_method: "slice"
    # Finer voxel for trunk detection (ground grid stays at 0.08 m)
    trunk_voxel_leaf_size_m: 0.03
    publish_ndsm_debug: false
    publish_slice_pipeline_debug: true
    publish_ground_ref_debug: true

    # nDSM band: 0.20-2.8 m above ground captures trunks, excludes canopy
    ndsm_trunk_min_m: 0.20
    ndsm_trunk_max_m: 2.8

    # Euclidean clustering (via trunk_cluster_tolerance_m from base yaml)
    trunk_cluster_tolerance_m: 0.22
    trunk_min_cluster_size: 6
    trunk_max_cluster_size: 600
    # Keep slice params for fallback (unused by euclidean path)
    slice_min_points_per_cluster: 3
    slice_max_stems_per_frame: 12

    # Geometry (used by euclidean detector)
    trunk_min_verticality: 0.55
    cylinder_min_height_m: 0.35
    cylinder_max_radius_m: 0.45
    cylinder_max_rmse_m: 0.18
    cylinder_min_inlier_ratio: 0.35
    cylinder_inlier_dist_m: 0.14
    cylinder_max_slice_height_m: 2.8

    # Tracking: persistent landmarks
    landmark_assoc_max_xy_m: 1.0
    landmark_max_misses: 20
