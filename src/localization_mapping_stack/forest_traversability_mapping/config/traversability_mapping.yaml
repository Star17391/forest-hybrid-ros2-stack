traversability_mapping_node:
  ros__parameters:
    # Frame da grelha. `map` (o do SLAM corrigido) — a camada VIVE no frame do
    # Tree-SLAM via TF map->base, para o mapa nao derivar com a odometria. Antes era
    # `odom` (provisorio, pre-SLAM): o grid inteiro deslizava com a deriva das rodas e
    # os obstaculos (do /slam/tree_map, em `map`) apareciam deslocados por map->odom.
    map_frame: map
    base_frame: marble_hd2/base_link
    cost_layer: cost

    # Janela local rolante (segue o robo via move()).
    size_x_m: 20.0
    size_y_m: 20.0
    resolution_m: 0.25

    publish_hz: 5.0
    tf_timeout_sec: 0.1

    # Valor de custo que mapeia para 100 no OccupancyGrid (custo normalizado 0..1).
    cost_max: 1.0

    # Desenrola o buffer circular do grid_map (startIndex->0) antes das operacoes de
    # vizinhanca, para corrigir as linhas de defeito em movimento. Se o mapa parecer
    # espelhado/invertido no RViz, por a FALSE para confirmar se a causa e este passo.
    defragment_buffer: true

    # --- Sprint 1A: custo de terreno (derivado da elevation_smooth) ---
    enable_terrain_cost: true
    slope_cost_max_deg: 25.0   # declive que satura o custo em 1.0
    step_obstacle_m: 0.35      # salto de altura na vizinhanca > isto => buraco/degrau (custo 1)

    # --- Obstaculos: dos landmarks COMPROMETIDOS do SLAM (/slam/tree_map) ---
    # Custo UNIFORME letal por obstaculo (nada deformavel para atravessar). A fonte
    # per-frame stateless (/perception/lidar/tree_landmarks) foi REMOVIDA: efemera e em
    # frame de odom. O mapa de obstaculos vem so do SLAM (persistente, corrigido).
    enable_obstacle_cost: true
    trunk_margin_m: 0.30       # margem dura em redor do landmark (zona de custo 1.0)
    obstacle_inflation_m: 0.40 # inflacao suave (custo decresce ate 0)
