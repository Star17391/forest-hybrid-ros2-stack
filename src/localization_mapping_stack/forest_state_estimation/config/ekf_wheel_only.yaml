# EKF sim degradado: SÓ wheel (sem IMU). 2D por necessidade — sem IMU não há
# NENHUMA observação de roll/pitch/z, logo em SE3 (two_d_mode=false) estes estados
# fariam random walk e a TF derivava (mesma falha do ekf_local pré-correção). Sem
# sensor de atitude, o único palpite honesto é "robô plano" → two_d_mode=true.
# Produção (com IMU) usa ekf_local.yaml (SE3 com roll/pitch absolutos ancorados).
ekf_local:
  ros__parameters:
    frequency: 10.0
    sensor_timeout: 0.3
    two_d_mode: true          # sem IMU: assume plano (ver nota acima)
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: false
    debug: false
    publish_tf: true
    publish_acceleration: false
    reset_on_time_jump: true

    map_frame: map
    odom_frame: odom
    base_link_frame: marble_hd2/base_link
    world_frame: odom

    odom0: /sensors/wheel_odometry
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 5
    odom0_differential: false
    odom0_relative: false
    odom0_twist_rejection_threshold: 5.0

