# Fase 1 — classificação 3D: só pontos próximos entram no RANSAC (mais credíveis).
lidar_scan_classify_node:
  ros__parameters:
    input_type: "pointcloud"
    pointcloud_topic: "/sensors/lidar/points"
    scan_topic: "/sensors/lidar/scan"
    classification_frame: "marble_hd2/base_link"
    classify_mode: "palacin_v1"
    labeled_cloud_topic: "/perception/lidar/points_labeled"
    labeled_cloud_output_frame: "map"
    scan_ground_topic: "/perception/lidar/scan_ground"
    scan_other_topic: "/perception/lidar/scan_other"
    scan_hazard_topic: "/perception/lidar/scan_hazard"
    min_range_m: 0.1
    max_range_m: 60.0
    classify_near_max_range_m: 8.0
    forward_min_x_m: 0.15
    ground_height_band_m: 0.05
    hole_depth_m: 0.05
    obstacle_height_m: 0.05
    ground_z_offset_m: 0.0
    ransac_inlier_thresh_m: 0.06
    ransac_max_iterations: 80
    ransac_min_inliers: 40
    ransac_min_inlier_ratio: 0.15
    tf_timeout_sec: 0.05
    fallback_laser_pitch_rad: 0.218166156
    fallback_laser_height_m: 0.36
    max_points_per_cloud: 120000
