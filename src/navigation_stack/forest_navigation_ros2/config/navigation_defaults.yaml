navigation_node:
  ros__parameters:
    use_sim_time: true
    pose_topic: /state/pose_fused
    mission_goal_topic: /planning/mission_goal
    cmd_vel_topic: /forest_gen/cmd_vel
    metrics_csv_path: /tmp/forest_navigation_metrics.csv
    control_rate_hz: 20.0
    trajectory_step_m: 0.25
    lookahead_m: 1.0
    max_linear_vel: 0.5
    max_angular_vel: 1.0
    goal_tolerance_m: 0.05
    goal_heading_tolerance_rad: 0.15
    approach_radius_m: 0.6
    map_frame: map
