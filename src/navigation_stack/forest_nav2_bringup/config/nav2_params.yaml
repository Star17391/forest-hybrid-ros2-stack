# Forest hybrid — Nav2 parameters (no AMCL; SLAM/EKF owns map→odom).
# Mock costmap: obstacle_layer from /sensors/lidar/scan until traversability layer (Agent 5).

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: marble_hd2/base_link
    odom_topic: /state/odometry
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_name_prefixes:
      - compute_path
      - follow_path
      - spin
      - backup
      - wait

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    path_handler_plugins: ["PathHandler"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.35
      movement_time_allowance: 15.0
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      # XY apertado p/ chegar à coordenada (era 0.35 = parava longe). Yaw IGNORADO
      # (3.15 rad): GOTO é de posição; com rotate_to_heading off o robô não roda no
      # sítio para fixar o rumo final, e exigir yaw bloqueava a chegada por direções
      # que não a do percurso. Confirmado ao vivo: chega a ~0.04 m da coordenada.
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 3.15
    PathHandler:
      plugin: "nav2_controller::FeasiblePathHandler"
      prune_distance: 2.0
    # Controlador = Regulated Pure Pursuit (RPP). Escolhido em vez do MPPI porque:
    #  (1) MPPI é o controlador mais pesado do Nav2 (amostra batch×time_steps a 20 Hz);
    #      com CPU saturado NÃO converge no período de controlo → comandos quase-zero
    #      (era a causa do vx≈0.056 constante).
    #  (2) RPP é praticamente grátis, determinístico e adequado a robô de esteiras lento
    #      a seguir um caminho global numa floresta.
    # IMPORTANTE: use_cost_regulated_linear_velocity_scaling = false → NÃO abranda perto
    # de custo do costmap (inflação/fantasmas), só pela curvatura. A deteção de colisão
    # (use_collision_detection) continua a proteger. Para voltar ao MPPI, ver histórico.
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.4
      min_approach_linear_velocity: 0.10
      approach_velocity_scaling_dist: 0.6
      # Lookahead MAIOR (era 0.6/0.9/1.5) p/ não perseguir cada degrau do caminho-grelha
      # do D* Lite → eliminou o weaving (overshoot-corrige-overshoot) confirmado ao vivo
      # (0 trocas de sinal do angular no cruzeiro). vel 0.4 (era 0.5): menos oscilação +
      # saúde do SLAM (a alta velocidade + oscilação o SLAM perdia-se).
      lookahead_dist: 0.9
      min_lookahead_dist: 0.5
      max_lookahead_dist: 1.3
      lookahead_time: 2.0
      use_velocity_scaled_lookahead_dist: true
      transform_tolerance: 0.2
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      # Regulação: SÓ por curvatura (mantém velocidade entre árvores). Custo OFF.
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      # rotate_to_heading DESLIGADO: o D* Lite produz caminhos em grelha (ziguezague
      # a 45°), o ângulo ao carrot passava sempre os 45° → o RPP entrava em "rodar no
      # sítio" e OSCILAVA (±0.1 rad/s) sem completar → linear ficava 0 → robô encravado.
      # Confirmado ao vivo: com isto false o robô conduz normalmente. Para esteiras,
      # rodar-e-andar ao mesmo tempo é adequado.
      use_rotate_to_heading: false
      rotate_to_heading_min_angle: 0.785
      rotate_to_heading_angular_vel: 1.0
      max_angular_accel: 2.0
      allow_reversing: false
      max_robot_pose_search_dist: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: marble_hd2/base_link
      rolling_window: true
      width: 8
      height: 8
      resolution: 0.10
      robot_radius: 0.45
      plugins: ["obstacle_layer", "inflation_layer"]
      # LOCAL = REATIVO. Fonte = non_ground (denso → reativo; inclui troncos, ROCHAS,
      # arbustos), mas filtrado à BANDA DE COLISÃO por altura: o critério não é
      # "tronco vs copa" mas "o robô bate nisto?". Robô baixo (~0.5 m) → marca-se
      # [0.1, 1.0] m (base de tronco/rocha/arbusto) e deixa-se passar a COPA (>~1 m,
      # o robô anda por baixo). 1 ponto da base chega p/ marcar a célula 2D.
      # NOTA: o filtro é em z ABSOLUTO (odom); em encostas fortes pode falhar — fix
      # definitivo seria nuvem de obstáculos nDSM (terrain-relative) na perceção.
      # NÃO usar stem_band aqui: esparso e exclui rochas (é p/ clustering de troncos).
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: cloud
        cloud:
          topic: /perception/lidar3d/experimental/non_ground
          data_type: "PointCloud2"
          marking: true
          clearing: true
          min_obstacle_height: 0.1   # ignora resíduo de solo rente ao chão
          max_obstacle_height: 1.0   # zona de colisão do robô; deixa passar a copa
          raytrace_max_range: 9.0
          obstacle_max_range: 8.0    # detetar mais cedo (era 6) → desvio mais cedo
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 1.0        # mais folga → desvio mais cedo e mais largo

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: marble_hd2/base_link
      rolling_window: true
      width: 40
      height: 40
      resolution: 0.10
      # Desconhecido = LIVRE: a fonte (committed_obstacles) só marca obstáculos
      # comprometidos; sem isto o costmap fica todo unknown e o DStarLite falha
      # ("no path found") em espaço aberto. O local reativo (non_ground) trata do
      # que ainda não está comprometido.
      track_unknown_space: false
      robot_radius: 0.45
      plugins: ["obstacle_layer", "inflation_layer"]
      # GLOBAL = DELIBERATIVO. Fonte = obstáculos COMPROMETIDOS do modelo do mundo
      # (forest_traversability_mapping, do /slam/tree_map: só promovidos + gate +
      # histerese), publicados como PointCloud2 em frame `map`. Mesma mecânica do
      # local (ObstacleLayer+PointCloud2), fonte e cadência DISTINTAS — sem tradutor.
      # marking sem clearing: é mapa conhecido estável; a janela rolante trata da
      # staleness e o uid faz o landmark seguir o loop closure.
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        # committed = mapa estável (troncos do SLAM); reactive = obstáculos detetados
        # AGORA (banda de colisão, copa filtrada). Pôr o reativo no GLOBAL faz o D* Lite
        # RE-ROTEAR à volta de obstáculos grandes → o caminho já os evita e o robô não
        # corta de volta para dentro deles (continua a desviar até a rota ficar livre).
        observation_sources: committed reactive
        committed:
          topic: /mapping/committed_obstacles
          data_type: "PointCloud2"
          marking: true
          clearing: false
          min_obstacle_height: 0.0
          max_obstacle_height: 2.0
          obstacle_max_range: 30.0
        reactive:
          topic: /perception/lidar3d/experimental/non_ground
          data_type: "PointCloud2"
          marking: true
          clearing: true   # raytrace limpa ao passar → não deixa fantasmas estáticos
          min_obstacle_height: 0.1
          max_obstacle_height: 1.0   # banda de colisão; deixa passar a copa
          raytrace_max_range: 9.0
          obstacle_max_range: 8.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 1.0

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_dstar_lite_planner::DStarLitePlanner"
      tolerance: 0.5
      allow_unknown: true
      # Suavização (média móvel) do caminho-grelha: 2 quase não suavizava → o RPP
      # perseguia os degraus/curvas e oscilava. 12 puxa o caminho para linhas mais
      # retas (a inflação dá margem para não cortar para dentro de obstáculos).
      smooth_iterations: 12.0

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 500
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: marble_hd2/base_link
    transform_tolerance: 0.3

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

route_server:
  ros__parameters:
    use_sim_time: true
    boundary_radius_to_achieve_node: 1.0
    radius_to_achieve_node: 2.0
    smooth_corners: true
    operations: ["AdjustSpeedLimit", "ReroutingService", "CollisionMonitor"]
    ReroutingService:
      plugin: "nav2_route::ReroutingService"
    AdjustSpeedLimit:
      plugin: "nav2_route::AdjustSpeedLimit"
    CollisionMonitor:
      plugin: "nav2_route::CollisionMonitor"
      max_collision_dist: 3.0
    edge_cost_functions: ["DistanceScorer", "CostmapScorer"]
    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"
    CostmapScorer:
      plugin: "nav2_route::CostmapScorer"

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 1.0]
    min_velocity: [-0.2, 0.0, -1.0]
    max_accel: [1.5, 0.0, 2.0]
    max_decel: [-1.5, 0.0, -2.0]
    odom_topic: "/state/odometry"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    use_sim_time: true
    base_frame_id: "marble_hd2/base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    transform_tolerance: 0.3
    source_timeout: 1.0
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: false
      enabled: true
    observation_sources: ["cloud"]
    cloud:
      type: "pointcloud"
      # non_ground na banda de colisão [0.1,1.0] — igual ao costmap local: parar por
      # obstáculos reais (tronco/rocha/arbusto), não pela copa.
      topic: "/perception/lidar3d/experimental/non_ground"
      min_height: 0.1
      max_height: 1.0
      enabled: true

docking_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    base_frame: "marble_hd2/base_link"
    fixed_frame: "odom"
    dock_plugins: ["simple_charging_dock"]
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true
      use_battery_status: false
      use_stall_detection: false
      dock_direction: "forward"
